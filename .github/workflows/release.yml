name: Release

on:
  push:
    tags: ["*.*.*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ -d "$BUNDLE_DIR" ]; then
            find "$BUNDLE_DIR" -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.tar.gz" -o -name "*.sig" \) -exec cp {} artifacts/ \;
          fi
          echo "--- Collected artifacts ---"
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: orbit-${{ matrix.label }}
          path: artifacts/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"

          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find artifacts -name "${pattern}.sig" 2>/dev/null | head -1)
            if [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          find_artifact() {
            local pattern="$1"
            find artifacts -name "$pattern" ! -name "*.sig" 2>/dev/null | head -1 | xargs -I{} basename {}
          }

          MACOS_ARM64=$(find_artifact "*aarch64*apple*.tar.gz")
          MACOS_ARM64_SIG=$(read_sig "*aarch64*apple*.tar.gz")
          MACOS_X64=$(find_artifact "*x86_64*apple*.tar.gz")
          MACOS_X64_SIG=$(read_sig "*x86_64*apple*.tar.gz")
          LINUX_X64=$(find_artifact "*.AppImage")
          LINUX_X64_SIG=$(read_sig "*.AppImage")
          WINDOWS_X64=$(find_artifact "*.msi")
          WINDOWS_X64_SIG=$(read_sig "*.msi")

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "See release notes at ${BASE_URL}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
          ENDJSON

          FIRST=true
          add_platform() {
            local key="$1" file="$2" sig="$3"
            [ -z "$file" ] && return
            if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> latest.json; fi
            cat >> latest.json << ENTRY
              "${key}": {
                "signature": "${sig}",
                "url": "${BASE_URL}/${file}"
              }
          ENTRY
          }

          add_platform "darwin-aarch64" "$MACOS_ARM64" "$MACOS_ARM64_SIG"
          add_platform "darwin-x86_64" "$MACOS_X64" "$MACOS_X64_SIG"
          add_platform "linux-x86_64" "$LINUX_X64" "$LINUX_X64_SIG"
          add_platform "windows-x86_64" "$WINDOWS_X64" "$WINDOWS_X64_SIG"

          cat >> latest.json << ENDJSON
            }
          }
          ENDJSON

          echo "--- latest.json ---"
          cat latest.json

          if ! grep -q '"url"' latest.json; then
            echo "ERROR: latest.json has no platforms"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
            latest.json
