name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    name: Typecheck & Tests

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload unsigned MSI for signing
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-msi
          path: src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Sign MSI with SignPath
        if: runner.os == 'Windows'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: orbit
          signing-policy-slug: release-signing
          artifact-configuration-slug: initial-version
          github-artifact-name: unsigned-msi
          wait-for-completion: true
          output-artifact-directory: signed-msi/

      - name: Replace MSI with signed version
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp signed-msi/*.msi "src-tauri/target/${{ matrix.target }}/release/bundle/msi/"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts/installers artifacts/updater
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          ARCH="${{ matrix.target }}"
          if [ -d "$BUNDLE_DIR" ]; then
            # User-facing installers
            find "$BUNDLE_DIR" -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" \) -exec cp {} artifacts/installers/ \;
            # Updater files — rename macOS artifacts to include architecture
            for f in $(find "$BUNDLE_DIR" -type f \( -name "*.tar.gz" -o -name "*.nsis.zip" \) ! -name "*.sig"); do
              base=$(basename "$f")
              if echo "$base" | grep -q "Orbit.app"; then
                cp "$f" "artifacts/updater/Orbit_${ARCH}.app.tar.gz"
                [ -f "$f.sig" ] && cp "$f.sig" "artifacts/updater/Orbit_${ARCH}.app.tar.gz.sig"
              else
                cp "$f" "artifacts/updater/"
                [ -f "$f.sig" ] && cp "$f.sig" "artifacts/updater/"
              fi
            done
          fi
          echo "--- Installers ---"
          ls -la artifacts/installers/ 2>/dev/null || echo "(empty)"
          echo "--- Updater ---"
          ls -la artifacts/updater/ 2>/dev/null || echo "(empty)"

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.label }}
          path: artifacts/installers/
          if-no-files-found: warn

      - name: Upload updater files
        uses: actions/upload-artifact@v7
        with:
          name: updater-${{ matrix.label }}
          path: artifacts/updater/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"

          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find artifacts -name "${pattern}.sig" 2>/dev/null | head -1)
            if [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          find_artifact() {
            local pattern="$1"
            find artifacts -name "$pattern" ! -name "*.sig" 2>/dev/null | head -1 | xargs -I{} basename {}
          }

          # Debug: show all downloaded artifacts
          echo "--- All artifacts ---"
          find artifacts -type f | sort

          MACOS_ARM64=$(find_artifact "*aarch64*apple*.tar.gz")
          MACOS_ARM64_SIG=$(read_sig "*aarch64*apple*.tar.gz")
          MACOS_X64=$(find_artifact "*x86_64*apple*.tar.gz")
          MACOS_X64_SIG=$(read_sig "*x86_64*apple*.tar.gz")
          LINUX_X64=$(find_artifact "*.AppImage")
          LINUX_X64_SIG=$(read_sig "*.AppImage")
          WINDOWS_X64=$(find_artifact "*.msi")
          WINDOWS_X64_SIG=$(read_sig "*.msi")

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "See release notes at ${BASE_URL}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
          ENDJSON

          FIRST=true
          add_platform() {
            local key="$1" file="$2" sig="$3"
            [ -z "$file" ] && return
            if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> latest.json; fi
            cat >> latest.json << ENTRY
              "${key}": {
                "signature": "${sig}",
                "url": "${BASE_URL}/${file}"
              }
          ENTRY
          }

          add_platform "darwin-aarch64" "$MACOS_ARM64" "$MACOS_ARM64_SIG"
          add_platform "darwin-x86_64" "$MACOS_X64" "$MACOS_X64_SIG"
          add_platform "linux-x86_64" "$LINUX_X64" "$LINUX_X64_SIG"
          add_platform "windows-x86_64" "$WINDOWS_X64" "$WINDOWS_X64_SIG"

          cat >> latest.json << ENDJSON
            }
          }
          ENDJSON

          echo "--- latest.json ---"
          cat latest.json

          if ! grep -q '"url"' latest.json; then
            echo "ERROR: latest.json has no platforms"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Orbit_*_aarch64.dmg` |
            | Windows | `Orbit_*_x64-setup.msi` |
            | Linux | `Orbit_*_amd64.deb` or `Orbit_*_amd64.AppImage` |

            <details><summary>Updater files (for auto-update, ignore these)</summary>

            The `.tar.gz`, `.sig`, `.nsis.zip` and `latest.json` files are used by the in-app auto-updater.
            </details>
          files: |
            artifacts/installers-*/*
            artifacts/updater-*/*
            latest.json
